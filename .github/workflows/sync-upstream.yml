name: Sync & Release from Upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.compare.outputs.has_new }}
      version: ${{ steps.get-ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get upstream version
        id: get-ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --repo NotValra/RoValra --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            TAG=$(gh api /repos/NotValra/RoValra/releases/latest --jq '.tag_name' 2>/dev/null || echo "0.0.0")
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Compare
        id: compare
        env:
          FORCE: ${{ inputs.force || false }}
        run: |
          LOCAL=$(jq -r '.version' manifest.json 2>/dev/null || echo "0.0.0")
          UPSTREAM=${{ steps.get-ver.outputs.version }}
          echo "Local: $LOCAL  Upstream: $UPSTREAM"
          if [ "$FORCE" = "true" ] || [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/NotValra/RoValra.git upstream
          rm -rf upstream/.git

      - name: Install deps
        run: |
          cd upstream
          npm ci 2>/dev/null || npm install 2>/dev/null || true

      - name: Build upstream
        run: cd upstream && node build.js 2>/dev/null || true

      - name: Build Firefox content script
        run: |
          cd upstream && npx esbuild src/content/index.js --bundle --outfile=../dist/content.js --keep-names --minify-syntax 2>&1

      - name: Setup dist
        run: |
          mkdir -p dist
          cp -r upstream/dist/* dist/ 2>/dev/null || true
          cp -r rules dist/ 2>/dev/null || true

      - name: Patch intercept.js for Firefox
        run: |
          node -e "
            const fs = require('fs');
            let code = fs.readFileSync('dist/intercept.js', 'utf8');
            code = code.replace(/originalFetch\(\.\.\.args\)/g, 'originalFetch.apply(window,args)');
            code = code.replace(/originalFetch\(\.\.\.arguments\)/g, 'originalFetch.apply(window,arguments)');
            fs.writeFileSync('dist/intercept.js', code);
            console.log('Patched intercept.js for Firefox fetch compatibility');
          "
          

      - name: Copy Firefox files
        run: |
          mkdir -p dist/src/background dist/src/content/core/firefox
          cp src/background/background.js dist/src/background/
          cp src/content/core/firefox/compat.js dist/src/content/core/firefox/

      - name: Write Firefox manifest
        run: |
          node -e "
            const fs=require('fs');
            const ff=JSON.parse(fs.readFileSync('manifest.json','utf8'));
            const up=JSON.parse(fs.readFileSync('upstream/manifest.json','utf8'));
            ff.version=up.version;
            ff.content_scripts = [
              {matches:['*://*.roblox.com/*','*://roblox.com/*'],js:['src/content/core/firefox/compat.js','content.js'],css:['css/sitewide.css','css/rovalra.css'],run_at:'document_start'}
            ];
            ff.web_accessible_resources = [
              {resources:['public/Assets/*','data/*','intercept.js','assets/*','css/*'],matches:['https://www.roblox.com/*','*://*.roblox.com/*']},
              ...(up.web_accessible_resources||[])
            ];
            fs.writeFileSync('dist/manifest.json',JSON.stringify(ff,null,2));
          "

      - name: Copy assets
        run: |
          for d in public assets; do
            [ -d "upstream/$d" ] && cp -r "upstream/$d" dist/ 2>/dev/null || true
          done

      - name: Package
        run: |
          cd dist
          VER=${{ needs.check.outputs.version }}
          zip -r ../rovalra-firefox-$VER.zip .

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER=${{ needs.check.outputs.version }}
          gh release create "v$VER" \
            --repo ${{ github.repository }} \
            --title "RoValra Firefox v$VER" \
            --notes "Auto-synced from upstream NotValra/RoValra v$VER" \
            rovalra-firefox-$VER.zip

      - name: Bump local version
        run: |
          VER=${{ needs.check.outputs.version }}
          node -e "const m=require('./manifest.json'); m.version='$VER'; require('fs').writeFileSync('manifest.json',JSON.stringify(m,null,2))"
          git config user.name "RoValra Bot"
          git config user.email "bot@localhost"
          git add manifest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: bump to v$VER [auto]" && git push)
