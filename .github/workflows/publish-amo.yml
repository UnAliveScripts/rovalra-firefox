name: Publish to AMO (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 2.5.10)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download release artifact
        run: |
          gh release download "v${{ inputs.version }}" \
            --repo ${{ github.repository }} \
            --pattern "*.zip" \
            --dir .

      - name: Sign and publish to AMO
        run: |
          npx web-ext sign \
            --source-dir dist \
            --api-key "${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret "${{ secrets.AMO_JWT_SECRET }}" \
            --channel unlisted
